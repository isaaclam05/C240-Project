<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>REMI+ | Login</title>

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <!-- Font Awesome -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <link
        rel="stylesheet"
        href="css/style.css"
    >

</head>

<body class="login-page">

    <div class="login-container">

        <!-- LEFT PANEL -->

        <div class="login-left">

            <div class="brand">

                <img
                    src="images/logo.png"
                    alt="REMI+"
                >

                <h1>REMI+</h1>

                <p>
                    AI-Powered Insurance Underwriting Platform
                </p>

            </div>

            <div class="welcome-card">

                <h2>
                    Welcome Back
                </h2>

                <p>

                    Sign in to continue reviewing insurance
                    applications, AI recommendations and
                    underwriting decisions.

                </p>

            </div>

        </div>

        <!-- RIGHT PANEL -->

        <div class="login-right">

            <div class="login-card">

                <h2>

                    Login

                </h2>

                <p>

                    Enter your REMI+ platform credentials

                </p>

                <form id="loginForm">

                    <!-- EMAIL -->

                    <div class="input-group">

                        <label>

                            Email

                        </label>

                        <div class="input-box">

                            <i class="fa-solid fa-envelope"></i>

                            <input
                                type="email"
                                id="email"
                                placeholder="name@company.com"
                                required
                            >

                        </div>

                    </div>

                    <!-- PASSWORD -->

                    <div class="input-group">

                        <label>

                            Password

                        </label>

                        <div class="input-box">

                            <i class="fa-solid fa-lock"></i>

                            <input
                                type="password"
                                id="password"
                                placeholder="Enter password"
                                required
                            >

                            <i
                                class="fa-solid fa-eye password-toggle"
                            ></i>

                        </div>

                    </div>

                    <!-- OPTIONS -->

                    <div class="login-options">

                        <label class="remember">

                            <input
                                type="checkbox"
                                id="rememberMe"
                            >

                            Remember Me

                        </label>

                        <a href="#">

                            Forgot Password?

                        </a>

                    </div>

                    <!-- BUTTON -->

                    <button
                        type="submit"
                        class="login-btn"
                    >

                        Login

                    </button>

                </form>

                <div class="login-footer">

                    <small>

                        © 2026 REMI+ All rights reserved.

                    </small>

                </div>

            </div>

        </div>

    </div>

    <script src="js/script.js"></script>

</body>

</html>
