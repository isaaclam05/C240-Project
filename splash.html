<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Care Companion</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/style.css">

</head>

<body class="splash-page">

    <div class="background">

        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>

    </div>

    <section class="hero">

        <div class="hero-left">

            <div class="logo">

                <div class="logo-circle">

                    <i class="bi bi-heart-pulse-fill"></i>

                </div>

                <div>

                    <h2>Care Companion</h2>

                    <p>AI Healthcare Assistant</p>

                </div>

            </div>

            <span class="badge">

                AI Powered Healthcare

            </span>

            <h1>

                Your AI Companion
                <br>
                For Better Healthcare

            </h1>

            <p class="description">

                Helping elderly patients stay healthy, independent and connected
                with caregivers through intelligent medication reminders,
                AI conversations and health monitoring.

            </p>

            <div class="buttons">

                <button id="getStartedBtn" class="primary-btn">

                    Get Started

                    <i class="bi bi-arrow-right"></i>

                </button>

            </div>

        </div>

        <div class="hero-right">

            <div class="hero-card">

                <!-- Replace later with your own illustration -->

                <a href="https://png.pngtree.com/template/20220913/ourmid/pngtree-3d-logo-design-image_1858757.jpg" target="_blank">
    <img src="https://png.pngtree.com/template/20220913/ourmid/pngtree-3d-logo-design-image_1858757.jpg"
         alt="Care Companion Logo"
         class="logo-img">
</a>

            </div>

        </div>

    </section>

    <script src="js/app.js"></script>

</body>

</html>
